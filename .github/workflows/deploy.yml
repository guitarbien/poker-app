name: 部署至 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一次部署，新的推送取消進行中的舊部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # 用 npm install 而非 npm ci：vite 8 底層 rolldown 的 wasm binding
      # (@rolldown/binding-wasm32-wasi → @emnapi) 是跨平台 optional 依賴，
      # 在 mac 產生的 lock 無法涵蓋 linux CI 需要的版本，npm ci 的嚴格比對會失敗
      - run: npm install --no-audit --no-fund
      # GITHUB_PAGES 觸發 vite.config.ts 的子路徑 base；build 已含 tsc -b 型別檢查
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
